<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0"/>

    <title>Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        body
        {
            background:
                linear-gradient(
                    rgba(5,10,20,0.9),
                    rgba(5,10,20,0.95)
                ),
                url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1600&auto=format&fit=crop');

            background-size: cover;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            color: white;
        }

        .login-card
        {
            width: 420px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(10px);

            border-radius: 20px;

            padding: 40px;

            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-control
        {
            background: rgba(255,255,255,0.08);

            border: none;

            color: white;

            padding: 14px;
        }

        .form-control::placeholder
        {
            color: rgba(255,255,255,0.6);
        }

        .btn-login
        {
            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 12px;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
                );

            color: white;

            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <h1 class="mb-4 text-center">
            DC Login
        </h1>

        <div class="mb-3">
            <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Email"
            />
        </div>

        <div class="mb-4">
            <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Password"
            />
        </div>

        <button
            class="btn-login"
            onclick="login()"
        >
            Login
        </button>

        <div
            id="message"
            class="mt-3 text-center"
        ></div>

    </div>

    <script>

        async function login()
        {
            const email =
                document.getElementById(
                    "email"
                ).value;

            const password =
                document.getElementById(
                    "password"
                ).value;

            try
            {
                const response =
                    await fetch(
                        "http://localhost:5153/api/auth/login",
                        {
                            method: "POST",

                            headers:
                            {
                                "Content-Type":
                                    "application/json"
                            },

                            body: JSON.stringify(
                            {
                                email,
                                password
                            })
                        }
                    );

                const data =
                    await response.json();

                if (response.ok)
                {
                    localStorage.setItem(
                        "token",
                        data.token
                    );

                    localStorage.setItem(
                        "email",
                        data.email
                    );

                    document.getElementById(
                        "message"
                    ).innerHTML =
                    `
                        <div class="alert alert-success">
                            Login successful
                        </div>
                    `;

                    setTimeout(() =>
                    {
                        window.location.href =
                            "locations.html";
                    }, 1000);
                }
                else
                {
                    document.getElementById(
                        "message"
                    ).innerHTML =
                    `
                        <div class="alert alert-danger">
                            ${data.error}
                        </div>
                    `;
                }
            }
            catch (error)
            {
                console.error(error);
            }
        }

    </script>

</body>
</html>
