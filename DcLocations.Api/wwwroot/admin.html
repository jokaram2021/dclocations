<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Admin Locations</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(to right, #000814, #001d3d);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            border-bottom: 2px solid #f1c94a;
        }

        .brand-gold {
            color: #f1c94a;
        }

        .admin-card {
            background: #111827;
            border: 1px solid rgba(241, 201, 74, 0.35);
            border-radius: 18px;
        }

        .btn-gold {
            background: #f1c94a;
            color: black;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #d9b63f;
            color: black;
        }
    </style>
</head>

<body>
    <script>
        const currentUser =
            JSON.parse(
                localStorage.getItem("dcUser") || "null"
            );

        if (!currentUser || currentUser.role !== "Admin") {
            alert(
                "Admin access only."
            );

            window.location.href =
                "locations.html";
        }
    </script>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
        <a
            class="navbar-brand fw-bold brand-gold"
            href="index.html"
        >
            DC Universe Explorer
        </a>

        <div class="navbar-nav ms-auto">
            <a
                class="nav-link"
                href="index.html"
            >
                Home
            </a>

            <a
                class="nav-link"
                href="locations.html"
            >
                Locations
            </a>

            <a
                class="nav-link"
                href="Favorites.html"
            >
                Favorites
            </a>

            <a
                class="nav-link"
                href="#"
                onclick="logout()"
            >
                Logout
            </a>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="display-5 fw-bold brand-gold mb-4">
            Admin Location Management
        </h1>

        <section class="admin-card p-4 mb-5">
            <h2 class="h4 brand-gold mb-3">
                Add or Edit Location
            </h2>

            <input
                type="hidden"
                id="locationId"
            >

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">
                        Name
                    </label>

                    <input
                        class="form-control"
                        id="name"
                    >
                </div>

                <div class="col-md-6">
                    <label class="form-label">
                        Category
                    </label>

                    <input
                        class="form-control"
                        id="category"
                    >
                </div>

                <div class="col-12">
                    <label class="form-label">
                        Description
                    </label>

                    <textarea
                        class="form-control"
                        id="description"
                        rows="3"
                    ></textarea>
                </div>

                <div class="col-md-4">
                    <label class="form-label">
                        Associated Hero/Faction
                    </label>

                    <input
                        class="form-control"
                        id="associatedHero"
                    >
                </div>

                <div class="col-md-4">
                    <label class="form-label">
                        Universe Region
                    </label>

                    <input
                        class="form-control"
                        id="universeRegion"
                    >
                </div>

                <div class="col-md-4">
                    <label class="form-label">
                        First Appearance
                    </label>

                    <input
                        class="form-control"
                        id="firstAppearance"
                    >
                </div>

                <div class="col-12">
                    <label class="form-label">
                        Image URL
                    </label>

                    <input
                        class="form-control"
                        id="imageUrl"
                        placeholder="Optional image URL"
                    >
                </div>

                <div class="col-12">
                    <label class="form-label">
                        Wiki URL
                    </label>

                    <input
                        class="form-control"
                        id="wikiUrl"
                        placeholder="https://dc.fandom.com/wiki/Gotham_City"
                    >
                </div>
            </div>

            <div class="mt-4">
                <button
                    class="btn btn-gold me-2"
                    onclick="saveLocation()"
                >
                    Save Location
                </button>

                <button
                    class="btn btn-outline-light"
                    onclick="clearForm()"
                >
                    Clear Form
                </button>
            </div>

            <div
                class="alert mt-3 d-none"
                id="message"
            ></div>
        </section>

        <section>
            <h2 class="h4 brand-gold mb-3">
                Existing Locations
            </h2>

            <div
                class="table-responsive"
                id="locationsTable"
            ></div>
        </section>
    </main>

    <script>
        function getUser() {
            return JSON.parse(
                localStorage.getItem("dcUser") || "null"
            );
        }

        function logout() {
            localStorage.removeItem("dcUser");
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        function showMessage(text, type) {
            const message =
                document.getElementById("message");

            message.className =
                `alert alert-${type} mt-3`;

            message.innerText = text;
        }

        function getFormData() {
            return {
                name:
                    document.getElementById("name").value.trim(),

                category:
                    document.getElementById("category").value.trim(),

                description:
                    document.getElementById("description").value.trim(),

                associatedHero:
                    document.getElementById("associatedHero").value.trim(),

                universeRegion:
                    document.getElementById("universeRegion").value.trim(),

                firstAppearance:
                    document.getElementById("firstAppearance").value.trim(),

                imageUrl:
                    document.getElementById("imageUrl").value.trim(),

                wikiUrl:
                    document.getElementById("wikiUrl").value.trim()
            };
        }

        function clearForm() {
            document.getElementById("locationId").value = "";
            document.getElementById("name").value = "";
            document.getElementById("category").value = "";
            document.getElementById("description").value = "";
            document.getElementById("associatedHero").value = "";
            document.getElementById("universeRegion").value = "";
            document.getElementById("firstAppearance").value = "";
            document.getElementById("imageUrl").value = "";
            document.getElementById("wikiUrl").value = "";
        }

        async function loadLocations() {
            const container =
                document.getElementById("locationsTable");

            try {
                const response =
                    await fetch("/api/locations");

                const locations =
                    await response.json();

                let html = `
                    <table class="table table-dark table-striped table-bordered align-middle">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Hero/Faction</th>
                                <th>Wiki</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                locations.forEach(location => {
                    html += `
                        <tr>
                            <td>${location.name}</td>
                            <td>${location.category}</td>
                            <td>${location.associatedHero || "N/A"}</td>
                            <td>
                                ${
                                    location.wikiUrl
                                        ? `<a class="brand-gold" href="${location.wikiUrl}" target="_blank" rel="noopener noreferrer">Open</a>`
                                        : "N/A"
                                }
                            </td>
                            <td>
                                <button
                                    class="btn btn-sm btn-warning me-2"
                                    onclick='editLocation(${JSON.stringify(location)})'
                                >
                                    Edit
                                </button>

                                <button
                                    class="btn btn-sm btn-danger"
                                    onclick="deleteLocation(${location.id})"
                                >
                                    Delete
                                </button>
                            </td>
                        </tr>
                    `;
                });

                html += `
                        </tbody>
                    </table>
                `;

                container.innerHTML = html;
            }
            catch (error) {
                console.error(error);

                container.innerHTML =
                    `<div class="alert alert-danger">
                        Failed to load locations.
                    </div>`;
            }
        }

        function editLocation(location) {
            document.getElementById("locationId").value =
                location.id;

            document.getElementById("name").value =
                location.name || "";

            document.getElementById("category").value =
                location.category || "";

            document.getElementById("description").value =
                location.description || "";

            document.getElementById("associatedHero").value =
                location.associatedHero || "";

            document.getElementById("universeRegion").value =
                location.universeRegion || "";

            document.getElementById("firstAppearance").value =
                location.firstAppearance || "";

            document.getElementById("imageUrl").value =
                location.imageUrl || "";

            document.getElementById("wikiUrl").value =
                location.wikiUrl || "";

            window.scrollTo(
                0,
                0
            );
        }

        async function saveLocation() {
            const user = getUser();

            const id =
                document.getElementById("locationId").value;

            const location =
                getFormData();

            if (!location.name || !location.category || !location.description) {
                showMessage(
                    "Name, category, and description are required.",
                    "danger"
                );

                return;
            }

            const isEdit =
                Boolean(id);

            const url =
                isEdit
                    ? `/api/locations/${id}`
                    : "/api/locations";

            const method =
                isEdit
                    ? "PUT"
                    : "POST";

            try {
                const response =
                    await fetch(
                        url,
                        {
                            method: method,
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization":
                                    `Bearer ${user.token}`
                            },
                            body: JSON.stringify(location)
                        }
                    );

                if (!response.ok) {
                    showMessage(
                        "Save failed. Make sure you are logged in as admin.",
                        "danger"
                    );

                    return;
                }

                showMessage(
                    "Location saved successfully.",
                    "success"
                );

                clearForm();
                loadLocations();
            }
            catch (error) {
                console.error(error);

                showMessage(
                    "Unable to save location.",
                    "danger"
                );
            }
        }

        async function deleteLocation(id) {
            const user = getUser();

            if (!confirm("Delete this location?")) {
                return;
            }

            try {
                const response =
                    await fetch(
                        `/api/locations/${id}`,
                        {
                            method: "DELETE",
                            headers: {
                                "Authorization":
                                    `Bearer ${user.token}`
                            }
                        }
                    );

                if (!response.ok) {
                    alert(
                        "Delete failed. Make sure you are logged in as admin."
                    );

                    return;
                }

                loadLocations();
            }
            catch (error) {
                console.error(error);

                alert(
                    "Unable to delete location."
                );
            }
        }

        loadLocations();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
