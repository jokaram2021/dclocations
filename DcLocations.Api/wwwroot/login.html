<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>DC Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(to right, #000814, #001d3d);
            color: white;
        }

        .navbar {
            border-bottom: 2px solid #f1c94a;
        }

        .brand-gold {
            color: #f1c94a;
        }

        .login-card {
            background: rgba(31, 41, 55, 0.96);
            border: 1px solid rgba(241, 201, 74, 0.35);
            border-radius: 20px;
            max-width: 460px;
            width: 100%;
        }

        .btn-gold {
            background: #f1c94a;
            color: black;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #d9b63f;
            color: black;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
        <a
            class="navbar-brand fw-bold brand-gold"
            href="index.html"
        >
            DC Universe Explorer
        </a>

        <div class="navbar-nav ms-auto">
            <a
                class="nav-link"
                href="index.html"
            >
                Home
            </a>

            <a
                class="nav-link"
                href="locations.html"
            >
                Locations
            </a>

            <a
                class="nav-link"
                href="register.html"
            >
                Create Account
            </a>
        </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center py-5">
        <section class="login-card p-4 p-md-5">
            <h1 class="text-center fw-bold brand-gold mb-4">
                DC Login
            </h1>

            <div
                class="alert alert-danger d-none"
                id="message"
            ></div>

            <label
                class="form-label"
                for="email"
            >
                Email or Username
            </label>

            <input
                class="form-control mb-3"
                type="text"
                id="email"
                placeholder="admin@dc.com"
            >

            <label
                class="form-label"
                for="password"
            >
                Password
            </label>

            <input
                class="form-control mb-4"
                type="password"
                id="password"
                placeholder="password123"
            >

            <button
                class="btn btn-gold w-100"
                onclick="login()"
            >
                Login
            </button>

            <p class="text-center mt-4 mb-0">
                Don't have an account?
                <a
                    class="brand-gold fw-bold"
                    href="register.html"
                >
                    Create Account
                </a>
            </p>
        </section>
    </main>

    <script>
        function showMessage(text) {
            const message =
                document.getElementById("message");

            message.innerText = text;
            message.classList.remove("d-none");
        }

        async function login() {
            const loginValue =
                document.getElementById("email").value.trim();

            const password =
                document.getElementById("password").value.trim();

            const message =
                document.getElementById("message");

            message.classList.add("d-none");
            message.innerText = "";

            if (!loginValue || !password) {
                showMessage(
                    "Please enter both your login and password."
                );

                return;
            }

            try {
                const response =
                    await fetch(
                        "/api/auth/login",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                email: loginValue,
                                username: loginValue,
                                password: password
                            })
                        }
                    );

                const data =
                    await response.json();

                if (!response.ok) {
                    showMessage(
                        data.error
                        || "Invalid login credentials."
                    );

                    return;
                }

                const user = {
                    userId: data.userId,
                    username: data.username,
                    email: data.email,
                    role: data.role,
                    token: data.token
                };

                localStorage.setItem(
                    "dcUser",
                    JSON.stringify(user)
                );

                localStorage.setItem(
                    "token",
                    user.token
                );

                window.location.href =
                    "locations.html";
            }
            catch (error) {
                console.error(error);

                showMessage(
                    "Unable to connect to the API."
                );
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
