<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Create Account</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(to right, #000814, #001d3d);
            color: white;
        }

        .navbar {
            border-bottom: 2px solid #f1c94a;
        }

        .brand-gold {
            color: #f1c94a;
        }

        .register-card {
            background: rgba(31, 41, 55, 0.96);
            border: 1px solid rgba(241, 201, 74, 0.35);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
        }

        .btn-gold {
            background: #f1c94a;
            color: black;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #d9b63f;
            color: black;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
        <a
            class="navbar-brand fw-bold brand-gold"
            href="index.html"
        >
            DC Universe Explorer
        </a>

        <div class="navbar-nav ms-auto">
            <a
                class="nav-link"
                href="index.html"
            >
                Home
            </a>

            <a
                class="nav-link"
                href="locations.html"
            >
                Locations
            </a>

            <a
                class="nav-link"
                href="login.html"
            >
                Login
            </a>
        </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center py-5">
        <section class="register-card p-4 p-md-5">
            <h1 class="text-center fw-bold brand-gold mb-4">
                Create Account
            </h1>

            <div
                class="alert alert-danger d-none"
                id="message"
            ></div>

            <label
                class="form-label"
                for="username"
            >
                Username
            </label>

            <input
                class="form-control mb-3"
                type="text"
                id="username"
                placeholder="batfan"
            >

            <label
                class="form-label"
                for="email"
            >
                Email
            </label>

            <input
                class="form-control mb-3"
                type="email"
                id="email"
                placeholder="you@example.com"
            >

            <label
                class="form-label"
                for="password"
            >
                Password
            </label>

            <input
                class="form-control mb-4"
                type="password"
                id="password"
                placeholder="At least 4 characters"
            >

            <button
                class="btn btn-gold w-100"
                onclick="register()"
            >
                Register
            </button>

            <p class="text-center mt-4 mb-0">
                Already have an account?
                <a
                    class="brand-gold fw-bold"
                    href="login.html"
                >
                    Login
                </a>
            </p>
        </section>
    </main>

    <script>
        function showMessage(text) {
            const message =
                document.getElementById("message");

            message.innerText = text;
            message.classList.remove("d-none");
        }

        async function register() {
            const username =
                document.getElementById("username").value.trim();

            const email =
                document.getElementById("email").value.trim();

            const password =
                document.getElementById("password").value.trim();

            const message =
                document.getElementById("message");

            message.classList.add("d-none");
            message.innerText = "";

            if (!username || !email || !password) {
                showMessage(
                    "Please complete all fields."
                );

                return;
            }

            if (!email.includes("@")) {
                showMessage(
                    "Please enter a valid email address."
                );

                return;
            }

            if (password.length < 4) {
                showMessage(
                    "Password must be at least 4 characters."
                );

                return;
            }

            try {
                const response =
                    await fetch(
                        "/api/auth/register",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                username: username,
                                email: email,
                                password: password
                            })
                        }
                    );

                const data =
                    await response.json();

                if (!response.ok) {
                    showMessage(
                        data.error
                        || "Registration failed."
                    );

                    return;
                }

                alert(
                    "Account created successfully. Please log in."
                );

                window.location.href =
                    "login.html";
            }
            catch (error) {
                console.error(error);

                showMessage(
                    "Unable to connect to the API."
                );
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
