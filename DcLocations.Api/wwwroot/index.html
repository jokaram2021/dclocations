<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>DC Universe Locations</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(to right, #000814, #001d3d);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            border-bottom: 2px solid #f1c94a;
        }

        .brand-gold {
            color: #f1c94a;
        }

        .hero {
            padding: 90px 20px;
        }

        .hero-card {
            background: rgba(17, 24, 39, 0.92);
            border: 1px solid rgba(241, 201, 74, 0.4);
            border-radius: 20px;
            padding: 50px;
        }

        .btn-gold {
            background: #f1c94a;
            color: black;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #d9b63f;
            color: black;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
        <a
            class="navbar-brand fw-bold brand-gold"
            href="index.html"
        >
            DC Universe Explorer
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div
            class="collapse navbar-collapse"
            id="navbarContent"
        >
            <div
                class="navbar-nav ms-auto"
                id="navLinks"
            ></div>
        </div>
    </nav>

    <main class="container hero">
        <section class="hero-card text-center">
            <h1 class="display-3 fw-bold brand-gold">
                DC Universe Locations
            </h1>

            <p class="lead mt-3">
                Browse iconic cities, kingdoms, bases, prisons, planets,
                and hidden locations from across the DC universe.
            </p>

            <div class="mt-4">
                <a
                    class="btn btn-gold btn-lg me-2"
                    href="locations.html"
                >
                    Browse Locations
                </a>

                <a
                    class="btn btn-outline-light btn-lg"
                    href="login.html"
                    id="loginButton"
                >
                    Login
                </a>
            </div>
        </section>
    </main>

    <script>
        function getUser() {
            return JSON.parse(
                localStorage.getItem("dcUser") || "null"
            );
        }

        function logout() {
            localStorage.removeItem("dcUser");
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        function renderNav() {
            const user = getUser();
            const navLinks = document.getElementById("navLinks");
            const loginButton = document.getElementById("loginButton");

            if (!user) {
                navLinks.innerHTML = `
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="locations.html">Locations</a>
                    <a class="nav-link" href="login.html">Login</a>
                    <a class="nav-link" href="register.html">Register</a>
                `;
                return;
            }

            if (loginButton) {
                loginButton.style.display = "none";
            }

            navLinks.innerHTML = `
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="locations.html">Locations</a>
                <a class="nav-link" href="Favorites.html">Favorites</a>
                ${
                    user.role === "Admin"
                        ? `<a class="nav-link" href="admin.html">Admin</a>`
                        : ""
                }
                <a class="nav-link" href="#" onclick="logout()">Logout</a>
            `;
        }

        renderNav();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
