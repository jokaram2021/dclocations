<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Favorites</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(to right, #000814, #001d3d);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            border-bottom: 2px solid #f1c94a;
        }

        .brand-gold {
            color: #f1c94a;
        }

        .favorite-card {
            background: #111827;
            border: 1px solid rgba(241, 201, 74, 0.35);
            border-radius: 18px;
            height: 100%;
        }

        .btn-gold {
            background: #f1c94a;
            color: black;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #d9b63f;
            color: black;
        }
    </style>
</head>

<body>
    <script>
        const currentUser =
            JSON.parse(
                localStorage.getItem("dcUser") || "null"
            );

        if (!currentUser || !currentUser.token) {
            window.location.href = "login.html";
        }
    </script>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
        <a
            class="navbar-brand fw-bold brand-gold"
            href="index.html"
        >
            DC Universe Explorer
        </a>

        <div
            class="navbar-nav ms-auto"
            id="navLinks"
        ></div>
    </nav>

    <header class="container py-5">
        <h1 class="display-4 fw-bold brand-gold">
            Your Favorite Locations
        </h1>

        <p class="lead">
            These are the DC locations saved to your account.
            You can view details, explore Wiki pages, or remove saved locations.
        </p>
    </header>

    <main class="container pb-5">
        <div
            class="row g-4"
            id="favoritesGrid"
        ></div>
    </main>

    <script>
        function getUser() {
            return JSON.parse(
                localStorage.getItem("dcUser") || "null"
            );
        }

        function logout() {
            localStorage.removeItem("dcUser");
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        function getWikiLink(location) {
            if (location.wikiUrl && location.wikiUrl.trim() !== "") {
                return location.wikiUrl;
            }

            return `https://dc.fandom.com/wiki/Special:Search?query=${encodeURIComponent(location.name)}`;
        }

        function renderNav() {
            const user = getUser();
            const navLinks = document.getElementById("navLinks");

            navLinks.innerHTML = `
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="locations.html">Locations</a>
                <a class="nav-link" href="Favorites.html">Favorites</a>
                ${
                    user && user.role === "Admin"
                        ? `<a class="nav-link" href="admin.html">Admin</a>`
                        : ""
                }
                <a class="nav-link" href="#" onclick="logout()">Logout</a>
            `;
        }

        async function loadFavorites() {
            const user = getUser();
            const grid = document.getElementById("favoritesGrid");

            try {
                const response =
                    await fetch(
                        "/api/favorites",
                        {
                            headers: {
                                "Authorization":
                                    `Bearer ${user.token}`
                            }
                        }
                    );

                if (!response.ok) {
                    throw new Error(
                        "Unable to load favorites."
                    );
                }

                const favorites =
                    await response.json();

                grid.innerHTML = "";

                if (!favorites || favorites.length === 0) {
                    grid.innerHTML =
                        `<div class="col-12">
                            <div class="alert alert-warning">
                                You have no favorites yet.
                            </div>
                        </div>`;

                    return;
                }

                favorites.forEach(location => {
                    const wikiLink = getWikiLink(location);

                    grid.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="card favorite-card text-white p-3">
                                <div class="card-body d-flex flex-column">
                                    <h2 class="h4 brand-gold">
                                        ${location.name}
                                    </h2>

                                    <p>
                                        ${location.description}
                                    </p>

                                    <p class="small mb-1">
                                        <strong>Hero/Faction:</strong>
                                        ${location.associatedHero || "N/A"}
                                    </p>

                                    <p class="small mb-3">
                                        <strong>Category:</strong>
                                        ${location.category || "N/A"}
                                    </p>

                                    <div class="mt-auto">
                                        <button
                                            class="btn btn-gold w-100 mb-2"
                                            onclick="viewDetails(${location.id})"
                                        >
                                            View Details
                                        </button>

                                        <a
                                            class="btn btn-outline-warning w-100 mb-2"
                                            href="${wikiLink}"
                                            target="_blank"
                                            rel="noopener noreferrer"
                                        >
                                            Explore Wiki
                                        </a>

                                        <button
                                            class="btn btn-danger w-100"
                                            onclick="removeFavorite(${location.id})"
                                        >
                                            Remove Favorite
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            catch (error) {
                console.error(error);

                grid.innerHTML =
                    `<div class="col-12">
                        <div class="alert alert-danger">
                            Failed to load favorites.
                        </div>
                    </div>`;
            }
        }

        function viewDetails(locationId) {
            window.location.href =
                `detail.html?id=${locationId}`;
        }

        async function removeFavorite(locationId) {
            const user = getUser();

            try {
                const response =
                    await fetch(
                        `/api/favorites/${locationId}`,
                        {
                            method: "DELETE",
                            headers: {
                                "Authorization":
                                    `Bearer ${user.token}`
                            }
                        }
                    );

                if (!response.ok) {
                    alert(
                        "Could not remove favorite."
                    );

                    return;
                }

                loadFavorites();
            }
            catch (error) {
                console.error(error);

                alert(
                    "Unable to remove favorite."
                );
            }
        }

        renderNav();
        loadFavorites();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
