<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Location Details</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(to right, #000814, #001d3d);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            border-bottom: 2px solid #f1c94a;
        }

        .brand-gold {
            color: #f1c94a;
        }

        .detail-card {
            background: #111827;
            border: 1px solid rgba(241, 201, 74, 0.35);
            border-radius: 20px;
        }

        .btn-gold {
            background: #f1c94a;
            color: black;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #d9b63f;
            color: black;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
        <a
            class="navbar-brand fw-bold brand-gold"
            href="index.html"
        >
            DC Universe Explorer
        </a>

        <div
            class="navbar-nav ms-auto"
            id="navLinks"
        ></div>
    </nav>

    <main
        class="container py-5"
        id="detailsContainer"
    >
        <div class="alert alert-info">
            Loading location...
        </div>
    </main>

    <script>
        let currentLocationId = null;

        function getUser() {
            return JSON.parse(
                localStorage.getItem("dcUser") || "null"
            );
        }

        function logout() {
            localStorage.removeItem("dcUser");
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        function getWikiLink(location) {
            if (location.wikiUrl && location.wikiUrl.trim() !== "") {
                return location.wikiUrl;
            }

            return `https://dc.fandom.com/wiki/Special:Search?query=${encodeURIComponent(location.name)}`;
        }

        function renderNav() {
            const user = getUser();
            const navLinks = document.getElementById("navLinks");

            if (!user) {
                navLinks.innerHTML = `
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="locations.html">Locations</a>
                    <a class="nav-link" href="login.html">Login</a>
                    <a class="nav-link" href="register.html">Register</a>
                `;
                return;
            }

            navLinks.innerHTML = `
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="locations.html">Locations</a>
                <a class="nav-link" href="Favorites.html">Favorites</a>
                ${
                    user.role === "Admin"
                        ? `<a class="nav-link" href="admin.html">Admin</a>`
                        : ""
                }
                <a class="nav-link" href="#" onclick="logout()">Logout</a>
            `;
        }

        async function loadDetails() {
            const params =
                new URLSearchParams(
                    window.location.search
                );

            const id =
                params.get("id");

            currentLocationId = id;

            const container =
                document.getElementById("detailsContainer");

            if (!id) {
                container.innerHTML =
                    `<div class="alert alert-danger">
                        No location ID was provided.
                    </div>`;

                return;
            }

            try {
                const response =
                    await fetch(
                        `/api/locations/${id}`
                    );

                if (!response.ok) {
                    throw new Error(
                        "Location not found."
                    );
                }

                const location =
                    await response.json();

                const wikiLink =
                    getWikiLink(location);

                container.innerHTML = `
                    <div class="row g-4">
                        <div class="col-lg-8">
                            <section class="detail-card p-4 p-md-5">
                                <p class="text-uppercase small brand-gold fw-bold">
                                    Location Profile
                                </p>

                                <h1 class="display-4 fw-bold brand-gold">
                                    ${location.name}
                                </h1>

                                <p class="lead mt-3">
                                    ${location.description}
                                </p>

                                <div
                                    class="alert alert-secondary mt-4"
                                    id="pokemonMatchBox"
                                >
                                    Loading DC Location Energy Match...
                                </div>

                                <button
                                    class="btn btn-gold me-2 mt-3"
                                    onclick="addFavorite(${location.id})"
                                >
                                    Add to Favorites
                                </button>

                                <a
                                    class="btn btn-outline-warning me-2 mt-3"
                                    href="${wikiLink}"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                >
                                    Explore Wiki
                                </a>

                                <a
                                    class="btn btn-outline-light mt-3"
                                    href="locations.html"
                                >
                                    Back to Locations
                                </a>
                            </section>
                        </div>

                        <div class="col-lg-4">
                            <aside class="detail-card p-4">
                                <h2 class="h4 brand-gold mb-3">
                                    Details
                                </h2>

                                <p>
                                    <strong>Category:</strong><br>
                                    ${location.category || "N/A"}
                                </p>

                                <p>
                                    <strong>Associated Hero/Faction:</strong><br>
                                    ${location.associatedHero || "N/A"}
                                </p>

                                <p>
                                    <strong>Universe Region:</strong><br>
                                    ${location.universeRegion || "N/A"}
                                </p>

                                <p>
                                    <strong>First Appearance:</strong><br>
                                    ${location.firstAppearance || "N/A"}
                                </p>

                                <p>
                                    <strong>Wiki:</strong><br>
                                    <a
                                        class="brand-gold"
                                        href="${wikiLink}"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                    >
                                        Learn more about ${location.name}
                                    </a>
                                </p>

                                <p>
                                    <strong>Energy Match:</strong><br>
                                    ${location.pokemonName || "pikachu"}
                                </p>
                            </aside>
                        </div>
                    </div>
                `;

                loadPokemonMatch(id);
            }
            catch (error) {
                console.error(error);

                container.innerHTML =
                    `<div class="alert alert-danger">
                        Unable to load this location.
                    </div>`;
            }
        }

        async function loadPokemonMatch(locationId) {
            const box =
                document.getElementById("pokemonMatchBox");

            try {
                const response =
                    await fetch(
                        `/api/locations/${locationId}/pokemon-match`
                    );

                const data =
                    await response.json();

                if (!response.ok) {
                    box.className =
                        "alert alert-danger mt-4";

                    box.innerHTML =
                        `
                            <strong>Energy Match Unavailable</strong><br>
                            ${data.error || "The match data could not be loaded."}
                        `;

                    return;
                }

                box.className =
                    "alert alert-success mt-4";

                box.innerHTML =
                    `
                        <strong>DC Location Energy Match</strong><br>
                        This location is matched with
                        <strong>${data.pokemonName}</strong>.<br>
                        <strong>Type(s):</strong>
                        ${data.types.join(", ")}
                    `;
            }
            catch (error) {
                console.error(error);

                box.className =
                    "alert alert-danger mt-4";

                box.innerHTML =
                    `
                        <strong>Energy Match Unavailable</strong><br>
                        Match data could not be loaded right now.
                    `;
            }
        }

        async function addFavorite(locationId) {
            const user = getUser();

            if (!user || !user.token) {
                alert(
                    "Please log in before adding favorites."
                );

                window.location.href =
                    "login.html";

                return;
            }

            try {
                const response =
                    await fetch(
                        "/api/favorites",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization":
                                    `Bearer ${user.token}`
                            },
                            body: JSON.stringify({
                                locationId: Number(locationId)
                            })
                        }
                    );

                if (!response.ok) {
                    alert(
                        "Favorite could not be added."
                    );

                    return;
                }

                alert(
                    "Added to favorites."
                );
            }
            catch (error) {
                console.error(error);

                alert(
                    "Unable to add favorite."
                );
            }
        }

        renderNav();
        loadDetails();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
