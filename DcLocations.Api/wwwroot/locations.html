<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>DC Universe Locations</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(to right, #000814, #001d3d);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            border-bottom: 2px solid #f1c94a;
        }

        .brand-gold {
            color: #f1c94a;
        }

        .location-card {
            background: #111827;
            border: 1px solid rgba(241, 201, 74, 0.35);
            border-radius: 18px;
            height: 100%;
        }

        .btn-gold {
            background: #f1c94a;
            color: black;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #d9b63f;
            color: black;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black px-4">
        <a
            class="navbar-brand fw-bold brand-gold"
            href="index.html"
        >
            DC Universe Explorer
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div
            class="collapse navbar-collapse"
            id="navbarContent"
        >
            <div
                class="navbar-nav ms-auto"
                id="navLinks"
            ></div>
        </div>
    </nav>

    <header class="container py-5">
        <h1 class="display-4 fw-bold brand-gold">
            DC Universe Locations
        </h1>

        <p class="lead">
            Browse, search, filter, favorite, and explore Wiki pages for DC locations.
        </p>

        <div class="row g-3 mt-3">
            <div class="col-md-8">
                <input
                    class="form-control"
                    id="searchInput"
                    type="text"
                    placeholder="Search by name..."
                    oninput="renderLocations()"
                >
            </div>

            <div class="col-md-4">
                <select
                    class="form-select"
                    id="categoryFilter"
                    onchange="renderLocations()"
                >
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container pb-5">
        <div
            class="alert alert-info d-none"
            id="statusMessage"
        ></div>

        <div
            class="row g-4"
            id="locationsGrid"
        ></div>
    </main>

    <script>
        let allLocations = [];

        function getUser() {
            return JSON.parse(
                localStorage.getItem("dcUser") || "null"
            );
        }

        function logout() {
            localStorage.removeItem("dcUser");
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }

        function getWikiLink(location) {
            if (location.wikiUrl && location.wikiUrl.trim() !== "") {
                return location.wikiUrl;
            }

            return `https://dc.fandom.com/wiki/Special:Search?query=${encodeURIComponent(location.name)}`;
        }

        function renderNav() {
            const user = getUser();
            const navLinks = document.getElementById("navLinks");

            if (!user) {
                navLinks.innerHTML = `
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="locations.html">Locations</a>
                    <a class="nav-link" href="login.html">Login</a>
                    <a class="nav-link" href="register.html">Register</a>
                `;
                return;
            }

            navLinks.innerHTML = `
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="locations.html">Locations</a>
                <a class="nav-link" href="Favorites.html">Favorites</a>
                ${
                    user.role === "Admin"
                        ? `<a class="nav-link" href="admin.html">Admin</a>`
                        : ""
                }
                <a class="nav-link" href="#" onclick="logout()">Logout</a>
            `;
        }

        function showStatus(text, type = "info") {
            const status =
                document.getElementById("statusMessage");

            status.className =
                `alert alert-${type}`;

            status.innerText = text;
        }

        function hideStatus() {
            const status =
                document.getElementById("statusMessage");

            status.className =
                "alert alert-info d-none";

            status.innerText = "";
        }

        async function loadLocations() {
            try {
                const response =
                    await fetch("/api/locations");

                if (!response.ok) {
                    throw new Error(
                        "Failed to load locations."
                    );
                }

                allLocations =
                    await response.json();

                buildCategoryFilter();
                renderLocations();
            }
            catch (error) {
                console.error(error);

                showStatus(
                    "Failed to load locations.",
                    "danger"
                );
            }
        }

        function buildCategoryFilter() {
            const select =
                document.getElementById("categoryFilter");

            const categories =
                [...new Set(
                    allLocations
                        .map(location => location.category)
                        .filter(Boolean)
                )].sort();

            select.innerHTML =
                `<option value="">All Categories</option>`;

            categories.forEach(category => {
                select.innerHTML +=
                    `<option value="${category}">${category}</option>`;
            });
        }

        function renderLocations() {
            hideStatus();

            const grid =
                document.getElementById("locationsGrid");

            const search =
                document
                    .getElementById("searchInput")
                    .value
                    .toLowerCase()
                    .trim();

            const category =
                document
                    .getElementById("categoryFilter")
                    .value;

            const filtered =
                allLocations.filter(location => {
                    const matchesSearch =
                        !search
                        || location.name
                            .toLowerCase()
                            .includes(search);

                    const matchesCategory =
                        !category
                        || location.category === category;

                    return matchesSearch && matchesCategory;
                });

            grid.innerHTML = "";

            if (filtered.length === 0) {
                grid.innerHTML =
                    `<div class="col-12">
                        <div class="alert alert-warning">
                            No locations matched your search or filter.
                        </div>
                    </div>`;

                return;
            }

            filtered.forEach(location => {
                const wikiLink = getWikiLink(location);

                grid.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card location-card text-white p-3">
                            <div class="card-body d-flex flex-column">
                                <h2 class="h4 brand-gold">
                                    ${location.name}
                                </h2>

                                <p class="mb-2">
                                    ${location.description}
                                </p>

                                <p class="small mb-1">
                                    <strong>Hero/Faction:</strong>
                                    ${location.associatedHero || "N/A"}
                                </p>

                                <p class="small mb-3">
                                    <strong>Category:</strong>
                                    ${location.category || "N/A"}
                                </p>

                                <div class="mt-auto">
                                    <button
                                        class="btn btn-gold w-100 mb-2"
                                        onclick="viewDetails(${location.id})"
                                    >
                                        View Details
                                    </button>

                                    <a
                                        class="btn btn-outline-warning w-100 mb-2"
                                        href="${wikiLink}"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                    >
                                        Explore Wiki
                                    </a>

                                    <button
                                        class="btn btn-outline-light w-100"
                                        onclick="addFavorite(${location.id})"
                                    >
                                        Add to Favorites
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function viewDetails(id) {
            window.location.href =
                `detail.html?id=${id}`;
        }

        async function addFavorite(locationId) {
            const user = getUser();

            if (!user || !user.token) {
                alert(
                    "Please log in before adding favorites."
                );

                window.location.href =
                    "login.html";

                return;
            }

            try {
                const response =
                    await fetch(
                        "/api/favorites",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization":
                                    `Bearer ${user.token}`
                            },
                            body: JSON.stringify({
                                locationId: Number(locationId)
                            })
                        }
                    );

                if (!response.ok) {
                    alert(
                        "Favorite could not be added."
                    );

                    return;
                }

                alert(
                    "Added to favorites."
                );
            }
            catch (error) {
                console.error(error);

                alert(
                    "Unable to add favorite."
                );
            }
        }

        renderNav();
        loadLocations();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
