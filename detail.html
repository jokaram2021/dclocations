<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="index.html">
            DC Locations
        </a>

        <div class="ms-auto">

            <a href="locations.html" class="btn btn-outline-light me-2">
                Locations
            </a>

            <a href="favorites.html" class="btn btn-warning">
                Favorites
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div
        id="successMessage"
        class="alert alert-success d-none"
    >
        Favorite added successfully!
    </div>

    <div
        id="errorMessage"
        class="alert alert-danger d-none"
    >
        Failed to add favorite.
    </div>

    <div id="loadingMessage" class="alert alert-info">
        Loading location...
    </div>

    <div id="locationCard" class="card shadow d-none">

        <div class="card-body">

            <h1 id="locationName"></h1>

            <span
                id="locationCategory"
                class="badge bg-primary mb-3"
            ></span>

            <p id="locationDescription"></p>

            <hr>

            <p>
                <strong>Associated Hero:</strong>
                <span id="locationHero"></span>
            </p>

            <p>
                <strong>Universe Region:</strong>
                <span id="locationRegion"></span>
            </p>

            <p>
                <strong>First Appearance:</strong>
                <span id="locationAppearance"></span>
            </p>

            <button
                id="favoriteButton"
                class="btn btn-warning mt-3"
            >
                Add Favorite
            </button>

            <a
                href="locations.html"
                class="btn btn-secondary mt-3 ms-2"
            >
                Back
            </a>

        </div>

    </div>

</div>

<script>

let currentLocationId = null;

async function loadLocation()
{
    try
    {
        const params =
            new URLSearchParams(window.location.search);

        const id = params.get("id");

        currentLocationId = id;

        const response =
            await fetch(
                `http://localhost:5153/api/locations/${id}`
            );

        if (!response.ok)
        {
            throw new Error("Location not found");
        }

        const location = await response.json();

        document
            .getElementById("loadingMessage")
            .classList.add("d-none");

        document
            .getElementById("locationCard")
            .classList.remove("d-none");

        document.getElementById("locationName").innerText =
            location.name;

        document.getElementById("locationCategory").innerText =
            location.category;

        document.getElementById("locationDescription").innerText =
            location.description;

        document.getElementById("locationHero").innerText =
            location.associatedHero;

        document.getElementById("locationRegion").innerText =
            location.universeRegion;

        document.getElementById("locationAppearance").innerText =
            location.firstAppearance;
    }
    catch (error)
    {
        document
            .getElementById("loadingMessage")
            .innerText =
            "Failed to load location.";

        console.error(error);
    }
}

document
    .getElementById("favoriteButton")
    .addEventListener("click", async function()
{
    try
    {
        const response =
            await fetch(
                "http://localhost:5153/api/favorites",
                {
                    method: "POST",

                    headers:
                    {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(
                    {
                        userId: localStorage.getItem("userId"),
                        locationId: currentLocationId
                    })
                }
            );

        const data = await response.json();

        if (!response.ok)
        {
            throw new Error(data.error);
        }

        document
            .getElementById("successMessage")
            .classList.remove("d-none");

        document
            .getElementById("errorMessage")
            .classList.add("d-none");

        console.log(data);
    }
    catch (error)
    {
        document
            .getElementById("errorMessage")
            .classList.remove("d-none");

        document
            .getElementById("successMessage")
            .classList.add("d-none");

        console.error(error);
    }
});

loadLocation();

</script>

</body>
</html>
