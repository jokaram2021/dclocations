<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="index.html">DC Locations</a>
</nav>

<div class="container mt-4">

    
    <input class="form-control mb-3" placeholder="Search locations...">

    
    <select class="form-select mb-4">
        <option>All Categories</option>
        <option>City</option>
        <option>Base</option>
        <option>Kingdom</option>
    </select>

    

    <div class="card mb-3 p-3">
        <h4>Gotham City</h4>
        <p>A dark city protected by Batman.</p>
        <a href="detail.html" class="btn btn-primary btn-sm">View</a>
    </div>

    <div class="card mb-3 p-3">
        <h4>Metropolis</h4>
        <p>The home city of Superman.</p>
        <a href="detail.html" class="btn btn-primary btn-sm">View</a>
    </div>

    <div class="card mb-3 p-3">
        <h4>Atlantis</h4>
        <p>An underwater kingdom ruled by Aquaman.</p>
        <a href="detail.html" class="btn btn-primary btn-sm">View</a>
    </div>

    
    <div class="alert alert-warning mt-3">
        No results found
    </div>

</div>

</body>
</html>
