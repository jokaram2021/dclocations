<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DC Universe Locations</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
        body
        {
            background:
                linear-gradient(
                    rgba(5, 10, 20, 0.92),
                    rgba(5, 10, 20, 0.96)
                ),
                url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1600&auto=format&fit=crop');

            background-size: cover;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
        }

        .navbar
        {
            background: rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .hero
        {
            padding-top: 90px;
            padding-bottom: 70px;
            text-align: center;
        }

        .hero-title
        {
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .hero-subtitle
        {
            font-size: 1.2rem;
            color: #c7d2fe;
            max-width: 700px;
            margin: auto;
        }

        .search-box
        {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 15px;
            border-radius: 15px;
        }

        .search-box::placeholder
        {
            color: rgba(255,255,255,0.6);
        }

        .form-select
        {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 15px;
            padding: 15px;
        }

        .form-select option
        {
            color: black;
        }

        .location-card
        {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);

            border-radius: 22px;

            overflow: hidden;

            transition:
                transform 0.3s ease,
                box-shadow 0.3s ease;

            backdrop-filter: blur(12px);

            height: 100%;
        }

        .location-card:hover
        {
            transform: translateY(-8px);

            box-shadow:
                0 0 25px rgba(59,130,246,0.4);
        }

        .location-image
        {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-body-custom
        {
            padding: 25px;
        }

        .category-badge
        {
            background: #2563eb;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn-details
        {
            background: linear-gradient(
                135deg,
                #2563eb,
                #7c3aed
            );

            border: none;

            border-radius: 12px;

            padding: 12px;

            width: 100%;

            color: white;

            font-weight: bold;

            transition: 0.3s ease;
        }

        .btn-details:hover
        {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .section-title
        {
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .footer
        {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
            margin-top: 50px;
        }

        .glow
        {
            color: #60a5fa;

            text-shadow:
                0 0 10px rgba(96,165,250,0.8);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-shield-halved"></i>
                DC Locations
            </a>

            <div class="d-flex gap-2">
                <a href="favorites.html" class="btn btn-outline-light">
                    Favorites
                </a>

                <a href="login.html" class="btn btn-primary">
                    Login
                </a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">

            <h1 class="hero-title">
                Explore the
                <span class="glow">DC Universe</span>
            </h1>

            <p class="hero-subtitle">
                Browse legendary cities, kingdoms, and secret bases from across
                the DC Universe. Discover iconic locations tied to your favorite heroes.
            </p>

        </div>
    </section>

    <div class="container">

        <div class="row mb-5">
            <div class="col-md-8 mb-3">
                <input
                    type="text"
                    id="searchInput"
                    class="form-control search-box"
                    placeholder="Search locations..."
                />
            </div>

            <div class="col-md-4 mb-3">
                <select
                    id="categoryFilter"
                    class="form-select"
                >
                    <option value="">All Categories</option>
                    <option value="City">City</option>
                    <option value="Island">Island</option>
                    <option value="Kingdom">Kingdom</option>
                    <option value="Base">Base</option>
                </select>
            </div>
        </div>

        <h2 class="section-title">
            Featured Locations
        </h2>

        <div class="row g-4" id="locationsContainer">

        </div>

    </div>

    <div class="footer">
        DC Universe Locations © 2026
    </div>

    <script>

        let allLocations = [];

        async function loadLocations()
        {
            try
            {
                const response =
                    await fetch(
                        "http://localhost:5153/api/locations"
                    );

                const locations =
                    await response.json();

                allLocations = locations;

                renderLocations(locations);
            }
            catch (error)
            {
                console.error(error);

                document.getElementById(
                    "locationsContainer"
                ).innerHTML =
                `
                    <div class="col-12">
                        <div class="alert alert-danger">
                            Failed to load locations.
                        </div>
                    </div>
                `;
            }
        }

        function getImage(locationName)
        {
            const images =
            {
                "Gotham City":
                    "https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1200&auto=format&fit=crop",

                "Metropolis":
                    "https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?q=80&w=1200&auto=format&fit=crop",

                "Themyscira":
                    "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop",

                "Atlantis":
                    "https://images.unsplash.com/photo-1518837695005-2083093ee35b?q=80&w=1200&auto=format&fit=crop",

                "Batcave":
                    "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop"
            };

            return images[locationName];
        }

        function renderLocations(locations)
        {
            const container =
                document.getElementById(
                    "locationsContainer"
                );

            container.innerHTML = "";

            locations.forEach(location =>
            {
                container.innerHTML +=
                `
                    <div class="col-lg-4 col-md-6">

                        <div class="location-card">

                            <img
                                src="${getImage(location.name)}"
                                class="location-image"
                            />

                            <div class="card-body-custom">

                                <span class="category-badge">
                                    ${location.category}
                                </span>

                                <h3 class="mb-3">
                                    ${location.name}
                                </h3>

                                <p class="text-light-emphasis">
                                    ${location.description}
                                </p>

                                <button
                                    class="btn-details"
                                    onclick="viewDetails(${location.id})"
                                >
                                    View Details
                                </button>

                            </div>

                        </div>

                    </div>
                `;
            });
        }

        function viewDetails(id)
        {
            window.location.href =
                `detail.html?id=${id}`;
        }

        document.getElementById(
            "searchInput"
        ).addEventListener("input", filterLocations);

        document.getElementById(
            "categoryFilter"
        ).addEventListener("change", filterLocations);

        function filterLocations()
        {
            const search =
                document.getElementById(
                    "searchInput"
                ).value.toLowerCase();

            const category =
                document.getElementById(
                    "categoryFilter"
                ).value;

            const filtered =
                allLocations.filter(location =>
                {
                    const matchesSearch =
                        location.name
                            .toLowerCase()
                            .includes(search);

                    const matchesCategory =
                        category === "" ||
                        location.category === category;

                    return (
                        matchesSearch &&
                        matchesCategory
                    );
                });

            renderLocations(filtered);
        }

        loadLocations();

    </script>

</body>
</html>
